<!DOCTYPE html>
<html lang="no"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovision 2026 – Finale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --esc-pink: #e91e8c;
  --esc-purple: #6a1fa2;
  --esc-blue: #1a1a6e;
  --esc-grad: linear-gradient(135deg, #6a1fa2 0%, #e91e8c 50%, #ff6b6b 100%);
  --gold: #FFD700;
  --white: #ffffff;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #0a0520;
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Starfield */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 20% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.4) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 0 12px 60px; }

/* ── HEADER ─────────────────────────────── */
.header {
  text-align: center;
  padding: 28px 0 20px;
  position: relative;
}
.esc-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 7vw, 48px);
  letter-spacing: 2px;
  background: var(--esc-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.esc-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── TABS ───────────────────────────────── */
.tabs {
  display: flex;
  gap: 8px;
  margin: 16px 0 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 50px;
  padding: 5px;
  border: 1px solid var(--card-border);
}
.tab-btn {
  flex: 1;
  padding: 11px 6px;
  border: none;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(12px, 3vw, 15px);
  font-weight: 800;
  cursor: pointer;
  transition: all 0.25s;
  background: transparent;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.3px;
}
.tab-btn.active {
  background: var(--esc-grad);
  color: white;
  box-shadow: 0 4px 20px rgba(233,30,140,0.4);
}

/* ── SECTION ────────────────────────────── */
.section { display: none; animation: fadeUp 0.35s ease; }
.section.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── SCOREBOARD (top summary) ───────────── */
.top-summary {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.top-summary .lead {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.45);
}
.top-summary .lead-name {
  font-weight: 900;
  font-size: 18px;
  color: var(--gold);
}
.reset-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 7px 16px;
  color: rgba(255,255,255,0.6);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { background: rgba(255,50,50,0.2); color: #ff6b6b; border-color: #ff6b6b; }

/* ── COUNTRY CARDS ──────────────────────── */
.country-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 14px 14px 10px;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.country-card:hover { border-color: rgba(233,30,140,0.4); background: rgba(255,255,255,0.08); }

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.card-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: rgba(255,255,255,0.2);
  width: 28px;
  flex-shrink: 0;
}
.card-flag { font-size: 26px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-country { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.5); }
.card-artist { font-weight: 800; font-size: clamp(14px, 3.5vw, 17px); color: white; line-height: 1.2; }
.card-song { font-size: 13px; color: rgba(255,255,255,0.55); font-style: italic; }
.card-total {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--gold);
  min-width: 48px;
  text-align: right;
  line-height: 1;
}
.card-total.zero { color: rgba(255,255,255,0.15); }

/* Star ratings */
.rating-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.rating-item label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.4);
  display: block;
  margin-bottom: 4px;
  text-align: center;
}
.stars {
  display: flex;
  justify-content: center;
  gap: 2px;
}
.star {
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.1s;
  color: rgba(255,255,255,0.15);
  line-height: 1;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.star:hover, .star.on { color: var(--gold); transform: scale(1.15); }
.star.on { filter: drop-shadow(0 0 4px rgba(255,215,0,0.6)); }

/* ── LEADERBOARD ────────────────────────── */
.leaderboard-list { display: flex; flex-direction: column; gap: 7px; }
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 12px 14px;
  transition: all 0.2s;
}
.lb-item.top1 { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.4); }
.lb-item.top2 { background: rgba(192,192,192,0.08); border-color: rgba(192,192,192,0.25); }
.lb-item.top3 { background: rgba(205,127,50,0.08); border-color: rgba(205,127,50,0.25); }
.lb-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  width: 32px;
  text-align: center;
  color: rgba(255,255,255,0.25);
  flex-shrink: 0;
}
.top1 .lb-rank { color: var(--gold); }
.top2 .lb-rank { color: #c0c0c0; }
.top3 .lb-rank { color: #cd7f32; }
.lb-flag { font-size: 24px; flex-shrink: 0; }
.lb-info { flex: 1; min-width: 0; }
.lb-country { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); }
.lb-artist { font-weight: 800; font-size: 15px; }
.lb-song { font-size: 12px; color: rgba(255,255,255,0.5); font-style: italic; }
.lb-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--gold);
  min-width: 42px;
  text-align: right;
  flex-shrink: 0;
}
.lb-score.zero { color: rgba(255,255,255,0.15); font-size: 20px; }
.lb-bar-wrap {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  margin-top: 6px;
  overflow: hidden;
}
.lb-bar {
  height: 100%;
  border-radius: 10px;
  background: var(--esc-grad);
  transition: width 0.5s ease;
}

/* ── BINGO ──────────────────────────────── */
.bingo-header {
  text-align: center;
  margin-bottom: 20px;
}
.bingo-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  background: var(--esc-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.bingo-header p { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.bingo-status {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 14px;
}
.bingo-status .count { color: var(--gold); }

.bingo-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.bingo-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(8px, 2vw, 11px);
  font-weight: 700;
  line-height: 1.2;
  padding: 6px 4px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(255,255,255,0.75);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.bingo-cell:hover:not(.free) { border-color: rgba(233,30,140,0.5); background: rgba(233,30,140,0.08); }
.bingo-cell.checked {
  background: var(--esc-grad);
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 16px rgba(233,30,140,0.4);
}
.bingo-cell.checked::after {
  content: '✓';
  position: absolute;
  top: 3px; right: 5px;
  font-size: 9px;
  color: rgba(255,255,255,0.7);
}
.bingo-cell.free {
  background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(233,30,140,0.2));
  border-color: rgba(255,215,0,0.4);
  color: var(--gold);
  cursor: default;
  font-size: clamp(9px, 2.5vw, 13px);
}
.bingo-win-banner {
  background: var(--esc-grad);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  display: none;
  animation: fadeUp 0.4s ease;
}
.bingo-win-banner.show { display: block; }
.bingo-win-banner h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.bingo-win-banner p { font-size: 14px; opacity: 0.85; }

/* ── SECTION HEADERS ────────────────────── */
.section-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-heading::before, .section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

/* ── CONFETTI ───────────────────────────── */
.confetti-piece {
  position: fixed;
  width: 8px; height: 12px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall 2.5s ease forwards;
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

.escnorge-credit {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 30px;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="esc-logo">☆ Eurovision Song Contest ☆</div>
    <div class="esc-sub">Vienna 2026 · Finale</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('stemme')">🎤 Stemmeskjema</button>
    <button class="tab-btn" onclick="setTab('topp')">🏆 Toppliste</button>
    <button class="tab-btn" onclick="setTab('bingo')">🎯 Bingo</button>
  </div>

  <!-- ── STEMMESKJEMA ───────────────────── -->
  <div id="tab-stemme" class="section active">
    <div class="top-summary" id="topSummary">
      <div>
        <div class="lead">🥇 I ledelsen</div>
        <div class="lead-name" id="leadText">— Ingen poeng ennå —</div>
      </div>
      <button class="reset-btn" onclick="confirmReset()">↺ Nullstill alt</button>
    </div>

    <div class="section-heading">Side 1 — 1–13</div>
    <div id="cards-1"></div>

    <div class="section-heading">Side 2 — 14–25</div>
    <div id="cards-2"></div>

    <div class="escnorge-credit">@escnorge</div>
  </div>

  <!-- ── TOPPLISTE ──────────────────────── -->
  <div id="tab-topp" class="section">
    <div id="leaderboard"></div>
    <div class="escnorge-credit">@escnorge</div>
  </div>

  <!-- ── BINGO ─────────────────────────── -->
  <div id="tab-bingo" class="section">
    <div class="bingo-header">
      <h2>🎯 Bingo Eurovision 2026</h2>
      <p>Kryss av det du ser og hører – prøv å få fullt brett!</p>
    </div>
    <div class="bingo-status">Avkrysset: <span class="count" id="bingoCount">0</span>/24</div>
    <div class="bingo-grid" id="bingoGrid"></div>
    <div class="bingo-win-banner" id="bingoWin">
      <h3>🎉 BINGO! 🎉</h3>
      <p>Du fikk fullt brett! Eurovision-mester! 🏆</p>
    </div>
    <div class="escnorge-credit">@escnorge</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const COUNTRIES = [
  { num:1,  flag:'🇩🇰', country:'Danmark',       artist:'Søren Torpegaard Lund', song:'Før Vi Går Hjem' },
  { num:2,  flag:'🇩🇪', country:'Tyskland',      artist:'Sarah Engels',           song:'Fire' },
  { num:3,  flag:'🇮🇱', country:'Israel',        artist:'Noam Bettan',            song:'Michelle' },
  { num:4,  flag:'🇧🇪', country:'Belgia',        artist:'ESSYLA',                 song:'Dancing On The Ice' },
  { num:5,  flag:'🇦🇱', country:'Albania',       artist:'Alis',                   song:'Nân' },
  { num:6,  flag:'🇬🇷', country:'Hellas',        artist:'Akylas',                 song:'Ferto' },
  { num:7,  flag:'🇺🇦', country:'Ukraina',       artist:'LELÉKA',                 song:'Ridnym' },
  { num:8,  flag:'🇦🇺', country:'Australia',     artist:'Delta Goodrem',          song:'Eclipse' },
  { num:9,  flag:'🇷🇸', country:'Serbia',        artist:'LAVINA',                 song:'Kraj Mene' },
  { num:10, flag:'🇲🇹', country:'Malta',         artist:'AIDAN',                  song:'Bella' },
  { num:11, flag:'🇨🇿', country:'Tsjekkia',      artist:'Daniel Zizka',           song:'CROSSROADS' },
  { num:12, flag:'🇧🇬', country:'Bulgaria',      artist:'DARA',                   song:'Bangaranga' },
  { num:13, flag:'🇭🇷', country:'Kroatia',       artist:'LELEK',                  song:'Andromeda' },
  { num:14, flag:'🇬🇧', country:'Storbritannia', artist:'LOOK MOM NO COMPUTER',   song:'Eins, Zwei, Drei' },
  { num:15, flag:'🇫🇷', country:'Frankrike',     artist:'Monroe',                 song:'Regarde!' },
  { num:16, flag:'🇲🇩', country:'Moldova',       artist:'Satoshi',                song:'Viva, Moldova!' },
  { num:17, flag:'🇫🇮', country:'Finland',       artist:'Linda Lampenius × Pete Parkkonen', song:'Liekinheitin' },
  { num:18, flag:'🇵🇱', country:'Polen',         artist:'ALICJA',                 song:'Pray' },
  { num:19, flag:'🇱🇹', country:'Litauen',       artist:'Lion Ceccah',            song:'Sólo quiero más' },
  { num:20, flag:'🇸🇪', country:'Sverige',       artist:'FELICIA',                song:'My System' },
  { num:21, flag:'🇨🇾', country:'Kypros',        artist:'Antigoni',               song:'Jalla' },
  { num:22, flag:'🇮🇹', country:'Italia',        artist:'Sal Da Vinci',           song:'Per Sempre Sí' },
  { num:23, flag:'🇳🇴', country:'Norge',         artist:'Jonas Lovv',             song:'Ya Ya Ya' },
  { num:24, flag:'🇷🇴', country:'Romania',       artist:'Alexandra Căpitănescu',  song:'Choke Me' },
  { num:25, flag:'🇦🇹', country:'Østerrike',     artist:'COSMÓ',                  song:'Tanzschein' },
];

const CATS = ['Vokal','Melodi','Styling','Show'];

const BINGO_ITEMS = [
  'Dyrehoder','Røde støvletter','Kyss på pannen','En støvel og en sko','Hvitt slips',
  'Lysende gitarstropper','Boxer-shorts','Dansende artister i green room','Notestativ','Røtter',
  'Skinnjakke','Beltespenne','FREE','Ringbrynje','Lommeur',
  'Kaffekopper','Skumle masker','Klør','Our 12 points go to...','Gule skolisser',
  'Strikketøy','Bandura','En tidligere Eurovision-vinner','Sølv-korsett','Pyro-foss'
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const KEY_SCORES = 'esc2026_scores';
const KEY_BINGO  = 'esc2026_bingo';

function loadScores() {
  try { return JSON.parse(localStorage.getItem(KEY_SCORES)) || {}; } catch{ return {}; }
}
function saveScores(s) { localStorage.setItem(KEY_SCORES, JSON.stringify(s)); }
function loadBingo() {
  try { return JSON.parse(localStorage.getItem(KEY_BINGO)) || {}; } catch{ return {}; }
}
function saveBingo(b) { localStorage.setItem(KEY_BINGO, JSON.stringify(b)); }

let scores = loadScores();
let bingo  = loadBingo();

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getTotal(num) {
  const s = scores[num] || {};
  return CATS.reduce((sum, c) => sum + (s[c] || 0), 0);
}
function getMaxTotal() {
  return Math.max(...COUNTRIES.map(c => getTotal(c.num)), 1);
}
function getLeader() {
  const sorted = [...COUNTRIES].sort((a,b) => getTotal(b.num) - getTotal(a.num));
  const t = getTotal(sorted[0].num);
  if (t === 0) return null;
  return sorted[0];
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function setTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'topp') renderLeaderboard();
}

// ─────────────────────────────────────────────
// STAR RATING COMPONENT
// ─────────────────────────────────────────────
function renderStars(num, cat, current) {
  let html = '<div class="stars">';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="star${i <= current ? ' on' : ''}" 
      data-num="${num}" data-cat="${cat}" data-val="${i}"
      onclick="setStar(${num},'${cat}',${i})"
      onmouseenter="previewStars(${num},'${cat}',${i})"
      onmouseleave="resetPreview(${num},'${cat}')">★</span>`;
  }
  html += '</div>';
  return html;
}

function setStar(num, cat, val) {
  if (!scores[num]) scores[num] = {};
  // Toggle off if clicking same value
  scores[num][cat] = (scores[num][cat] === val) ? 0 : val;
  saveScores(scores);
  updateCard(num);
  updateLead();
}

function previewStars(num, cat, val) {
  const container = document.querySelector(`[data-rnum="${num}"][data-rcat="${cat}"]`);
  if (!container) return;
  container.querySelectorAll('.star').forEach((s,i) => {
    s.classList.toggle('on', i < val);
  });
}
function resetPreview(num, cat) {
  const container = document.querySelector(`[data-rnum="${num}"][data-rcat="${cat}"]`);
  if (!container) return;
  const cur = (scores[num] && scores[num][cat]) || 0;
  container.querySelectorAll('.star').forEach((s,i) => {
    s.classList.toggle('on', i < cur);
  });
}

function updateCard(num) {
  const total = getTotal(num);
  const totalEl = document.getElementById(`total-${num}`);
  if (totalEl) {
    totalEl.textContent = total;
    totalEl.className = 'card-total' + (total === 0 ? ' zero' : '');
  }
  // update each cat rating display
  CATS.forEach(cat => {
    const wrap = document.querySelector(`[data-rnum="${num}"][data-rcat="${cat}"]`);
    if (!wrap) return;
    const cur = (scores[num] && scores[num][cat]) || 0;
    wrap.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('on', i < cur));
  });
}

function updateLead() {
  const leader = getLeader();
  const el = document.getElementById('leadText');
  if (!leader) { el.textContent = '— Ingen poeng ennå —'; return; }
  el.textContent = `${leader.flag} ${leader.artist} — ${getTotal(leader.num)} poeng`;
}

// ─────────────────────────────────────────────
// RENDER CARDS
// ─────────────────────────────────────────────
function renderCard(c) {
  const total = getTotal(c.num);
  let cats = CATS.map(cat => {
    const cur = (scores[c.num] && scores[c.num][cat]) || 0;
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      stars += `<span class="star${i <= cur ? ' on' : ''}" onclick="setStar(${c.num},'${cat}',${i})" onmouseenter="previewStars(${c.num},'${cat}',${i})" onmouseleave="resetPreview(${c.num},'${cat}')">★</span>`;
    }
    return `<div class="rating-item">
      <label>${cat}</label>
      <div class="stars" data-rnum="${c.num}" data-rcat="${cat}">${stars}</div>
    </div>`;
  }).join('');

  return `
    <div class="country-card" id="card-${c.num}">
      <div class="card-top">
        <div class="card-num">${c.num}</div>
        <div class="card-flag">${c.flag}</div>
        <div class="card-info">
          <div class="card-country">${c.country}</div>
          <div class="card-artist">${c.artist}</div>
          <div class="card-song">${c.song}</div>
        </div>
        <div class="card-total${total === 0 ? ' zero' : ''}" id="total-${c.num}">${total}</div>
      </div>
      <div class="rating-row">${cats}</div>
    </div>`;
}

function renderAllCards() {
  const c1 = COUNTRIES.slice(0, 13);
  const c2 = COUNTRIES.slice(13);
  document.getElementById('cards-1').innerHTML = c1.map(renderCard).join('');
  document.getElementById('cards-2').innerHTML = c2.map(renderCard).join('');
  updateLead();
}

// ─────────────────────────────────────────────
// LEADERBOARD
// ─────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = [...COUNTRIES].sort((a,b) => getTotal(b.num) - getTotal(a.num));
  const max = getMaxTotal();
  const html = sorted.map((c, i) => {
    const t = getTotal(c.num);
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const rankEmoji = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1;
    const pct = max > 0 ? Math.round((t / max) * 100) : 0;
    const cats = CATS.map(cat => {
      const v = (scores[c.num] && scores[c.num][cat]) || 0;
      return `<span style="font-size:11px;color:rgba(255,255,255,0.4)">${cat}: ${'★'.repeat(v)}${'☆'.repeat(5-v)}</span>`;
    }).join('  ');
    return `
      <div class="lb-item ${rankClass}">
        <div class="lb-rank">${rankEmoji}</div>
        <div class="lb-flag">${c.flag}</div>
        <div class="lb-info">
          <div class="lb-country">${c.country}</div>
          <div class="lb-artist">${c.artist}</div>
          <div class="lb-song">${c.song}</div>
          ${t > 0 ? `<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">${cats}</div>` : ''}
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
        </div>
        <div class="lb-score${t===0?' zero':''}">${t > 0 ? t : '—'}</div>
      </div>`;
  }).join('');
  document.getElementById('leaderboard').innerHTML = html;
}

// ─────────────────────────────────────────────
// BINGO
// ─────────────────────────────────────────────
function renderBingo() {
  const html = BINGO_ITEMS.map((item, i) => {
    const isFree = item === 'FREE';
    const checked = isFree ? true : !!bingo[i];
    const cls = isFree ? 'bingo-cell free' : (checked ? 'bingo-cell checked' : 'bingo-cell');
    const click = isFree ? '' : `onclick="toggleBingo(${i})"`;
    return `<div class="${cls}" ${click}>${isFree ? '⭐ GRATIS' : item}</div>`;
  }).join('');
  document.getElementById('bingoGrid').innerHTML = html;
  updateBingoCount();
}

function toggleBingo(idx) {
  bingo[idx] = !bingo[idx];
  saveBingo(bingo);
  const cell = document.querySelectorAll('.bingo-cell:not(.free)')[idx];
  // find the right cell
  renderBingo();
  checkBingoWin();
}

function updateBingoCount() {
  const checked = Object.values(bingo).filter(Boolean).length;
  document.getElementById('bingoCount').textContent = checked;
}

function checkBingoWin() {
  const allChecked = BINGO_ITEMS.every((item, i) => item === 'FREE' || !!bingo[i]);
  const winBanner = document.getElementById('bingoWin');
  if (allChecked) {
    winBanner.classList.add('show');
    launchConfetti();
  } else {
    winBanner.classList.remove('show');
  }
}

// ─────────────────────────────────────────────
// CONFETTI
// ─────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#e91e8c','#FFD700','#6a1fa2','#ff6b6b','#00e5ff','#69f0ae'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:${-20 + Math.random()*-30}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        transform:rotate(${Math.random()*360}deg);
        animation-delay:${Math.random()*0.8}s;
        animation-duration:${2+Math.random()*1.5}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ─────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────
function confirmReset() {
  if (confirm('Nullstille alle poeng? Dette kan ikke angres.')) {
    scores = {};
    saveScores(scores);
    renderAllCards();
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderAllCards();
renderBingo();
checkBingoWin();
</script>
</body>
</html>
